<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galeri</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; z-index: 1;  }
        #gallery-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98); display: none; z-index: 9999;
            flex-direction: column; justify-content: center; backdrop-filter: blur(15px);
            perspective: 1200px;
        }
        .swiper { width: 100%; height: 80vh; padding-top: 50px; padding-bottom: 50px; }
        .swiper-slide { 
            width: 80vw;
            height: 60vh;
            display: flex; justify-content: center; align-items: center;
            background: transparent;
        }
        .swiper-slide img { 
            display: block; 
            max-width: 80%; 
            max-height: 80%;
            width: auto;
            height: auto;
            object-fit: contain; 
            border-radius: 10px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        }
        .photo-info { color: #fff; margin-top: 10px; text-align: center; padding: 0 20px; }
        .photo-info h2 { margin: 0; font-size: 22px; letter-spacing: 1px; }
        .close-btn {
            position: absolute; top: 30px; right: 25px; color: #fff;
            font-size: 45px; cursor: pointer; z-index: 10000;
            width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.15); border-radius: 50%;
        }
        .custom-marker {
            width: 45px !important; height: 45px !important; 
            background: #ff0000;
            border: 4px solid #fff; border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            cursor: pointer; transition: all 0.3s ease;
        }
        .custom-marker:hover { transform: scale(1.3); }
        .loading { color: white; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 0; }
        
        
        .emoji-marker-style {
            background: none !important;
            border: none !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="loading">Harita Yükleniyor...</div>
<div id="map"></div>

<div id="gallery-modal">
    <div class="close-btn" onclick="closeGallery()">&times;</div>
    <div class="swiper">
        <div class="swiper-wrapper" id="slider-content"></div>
        <div class="swiper-pagination"></div>
    </div>
    <div class="photo-info">
        <h2 id="modal-title"></h2>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    var map = L.map('map', { zoomControl: false }).setView([39.0, 35.0], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var swiper = new Swiper(".swiper", {
        effect: "coverflow",
        grabCursor: true,
        centeredSlides: true,
        slidesPerView: "auto",
        coverflowEffect: {
            rotate: 45,
            stretch: 10,
            depth: 400,
            modifier: 1.5,
            slideShadows: true,
        },
        pagination: { el: ".swiper-pagination", clickable: true }
    });

    function openGallery(title, images) {
        const wrapper = document.getElementById('slider-content');
        wrapper.innerHTML = ""; 
        images.forEach(url => {
            wrapper.innerHTML += `<div class="swiper-slide"><img src="${url}"></div>`;
        });
        document.getElementById('modal-title').innerText = title;
        document.getElementById('gallery-modal').style.display = 'flex';
        setTimeout(() => {
            swiper.update();
            swiper.slideTo(Math.floor(images.length / 2), 0);
        }, 150);
    }

    function closeGallery() {
        document.getElementById('gallery-modal').style.display = 'none';
    }

    function aniEkle(lat, lng, baslik, fotoDizisi) {
        var icon = L.divIcon({ className: 'custom-marker', iconSize: [45, 45], iconAnchor: [22, 22] });
        var marker = L.marker([lat, lng], {icon: icon}).addTo(map);
        marker.on('click', function() {
            openGallery(baslik, fotoDizisi);
        });
    }

    aniEkle(38.2885662831978, 26.379525435810383, "", ["1.jpeg", "2.jpeg", "27.jpeg", "26.jpeg", "13.jpeg", "9.jpeg", "21.jpeg"]);
    aniEkle(38.38187719217507, 27.179811387580582, "", ["8.jpeg", "4.jpeg", "19.jpeg", "23.jpeg", "24.jpeg", "16.jpeg", "12.jpeg"]);
    aniEkle(37.04695187158088, 35.29309820690316, "", ["3.jpeg", "6.jpeg", "25.jpeg", "10.jpeg", "22.jpeg", "15.jpeg", "11.jpeg", "7.jpeg", "14.jpeg", "99.jpg"]);
    
    
    L.marker([40.35500812341561, 27.969860090522594], {
        icon: L.divIcon({
            html: '<div style="font-size: 35px;">⌛</div>',
            className: 'emoji-marker-style',
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        })
    }).addTo(map);

    
    L.marker([36.64312665412601, 34.377776919020896], {
        icon: L.divIcon({
            html: '<div style="font-size: 35px;">⌛</div>',
            className: 'emoji-marker-style',
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        })
    }).addTo(map);

    L.marker([39.92488833905181, 32.837078699927964], {
        icon: L.divIcon({
            html: '<div style="font-size: 35px;">⌛</div>',
            className: 'emoji-marker-style',
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        })
    }).addTo(map);


    L.marker([40.98772019149093, 29.03688159927305], {
        icon: L.divIcon({
            html: '<div style="font-size: 35px;">⌛</div>',
            className: 'emoji-marker-style',
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        })
    }).addTo(map);


    L.marker([37.667559013315525, 36.29054859510243], {
        icon: L.divIcon({
            html: '<div style="font-size: 35px;">⌛</div>',
            className: 'emoji-marker-style',
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        })
    }).addTo(map);
</script>
</body>
</html>
